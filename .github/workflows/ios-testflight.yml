name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build and upload to TestFlight
    runs-on: macos-26

    env:
      FLUTTER_VERSION: '3.32.0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Print versions
        run: |
          flutter --version
          xcodebuild -version
          pod --version || true
          sw_vers

      - name: Flutter pub get
        run: flutter pub get

      - name: Decode App Store Connect API private key
        id: asc_key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
        run: |
          echo "${ASC_API_KEY_BASE64}" | base64 --decode > "${RUNNER_TEMP}/asc_api_key.p8"
          {
            echo 'asc_api_key<<APPLE_KEY_EOF'
            cat "${RUNNER_TEMP}/asc_api_key.p8"
            echo
            echo 'APPLE_KEY_EOF'
          } >> "$GITHUB_OUTPUT"
          echo "::add-mask::$(cat "${RUNNER_TEMP}/asc_api_key.p8")"
          echo "ASC API Key 解码 OK ($(wc -c < "${RUNNER_TEMP}/asc_api_key.p8") bytes)"

      - name: Import code-signing certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH="${RUNNER_TEMP}/build_certificate.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/app-signing.keychain-db"

          echo "${BUILD_CERTIFICATE_BASE64}" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "${P12_PASSWORD}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "${KEYCHAIN_PASSWORD}" "$KEYCHAIN_PATH" >/dev/null

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Download provisioning profile
        uses: apple-actions/download-provisioning-profiles@v3
        with:
          bundle-id: com.aiquant.app
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.ASC_API_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_API_KEY_ID }}
          api-private-key: ${{ steps.asc_key.outputs.asc_api_key }}

      - name: Build IPA
        run: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Locate IPA
        id: locate_ipa
        run: |
          ls -la build/ios/ipa/
          IPA_PATH=$(ls build/ios/ipa/*.ipa | head -n 1)
          echo "ipa_path=${IPA_PATH}" >> "$GITHUB_OUTPUT"
          echo "Found IPA: ${IPA_PATH}"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ steps.locate_ipa.outputs.ipa_path }}
          issuer-id: ${{ secrets.ASC_API_ISSUER_ID }}
          api-key-id: ${{ secrets.ASC_API_KEY_ID }}
          api-private-key: ${{ steps.asc_key.outputs.asc_api_key }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain "${RUNNER_TEMP}/app-signing.keychain-db" || true
          rm -f "${RUNNER_TEMP}/build_certificate.p12" "${RUNNER_TEMP}/asc_api_key.p8" || true
