# api.singzquant.com — Finme backend HTTPS 反代
#
# 80 端口：仅做 HTTPS 跳转 + ACME 续签预留路径（webroot 模式）
# 443 端口：终止 TLS，反代到 finme-api (127.0.0.1:8080)
#
# 证书路径：/server/ssl/api.singzquant.com.{pem,key}
# 续签提示：阿里云 DV 证书一年到期需要再下一份 zip → 替换 /server/ssl 下两个文件 → systemctl reload nginx

# 限制每 IP 简单速率（与 backend 自身限流叠加）
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=20r/s;

server {
    listen 80;
    listen [::]:80;
    server_name api.singzquant.com www.api.singzquant.com;
    # 留一条给将来 Let's Encrypt webroot 续签，其它一律跳 https
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.singzquant.com www.api.singzquant.com;

    ssl_certificate     /server/ssl/api.singzquant.com.pem;
    ssl_certificate_key /server/ssl/api.singzquant.com.key;

    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    # 安全头
    add_header Strict-Transport-Security "max-age=15768000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 关闭 server token + 限请求体（256 KB 与 backend DecodeJSON 对齐）
    server_tokens off;
    client_max_body_size 1m;

    # access log 单文件，方便审计
    access_log /var/log/nginx/api.singzquant.com.access.log;
    error_log  /var/log/nginx/api.singzquant.com.error.log;

    # 法律文本（隐私政策 / 用户协议）静态托管
    # 部署时执行：rsync backend/deploy/legal/ /server/legal/
    location ^~ /legal/ {
        alias /server/legal/;
        index privacy.html terms.html;
        default_type text/html;
        charset utf-8;
        add_header Cache-Control "public, max-age=3600";
        # 这里不走 limit_req，避免审核员反复刷新被限流
    }

    # /metrics 仅允许本机访问（运维 ssh 隧道 / Prometheus 同机部署）
    # 公网扫描 → 403
    location = /metrics {
        allow 127.0.0.1;
        allow ::1;
        deny all;
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # /v1/ai/chat —— SSE 流式：必须关闭 buffering、关闭 chunked 拼接，
    # 并把超时调到 ≥ 后端 LLM timeout（180s）。
    location = /v1/ai/chat {
        limit_req zone=api_per_ip burst=10 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering    off;
        proxy_cache        off;
        proxy_request_buffering off;

        chunked_transfer_encoding on;
        gzip off;
    }

    # /v1/ding/tasks/{uuid}/run-now —— 同步阻塞 LLM 工具循环（≤180s）。
    # 走 regex match：location ~ "^/v1/ding/tasks/[^/]+/run-now$"
    location ~ "^/v1/ding/tasks/[^/]+/run-now$" {
        limit_req zone=api_per_ip burst=10 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;

        proxy_buffering on;
    }

    location / {
        limit_req zone=api_per_ip burst=40 nodelay;

        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Request-Id $request_id;

        proxy_connect_timeout 5s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        proxy_buffering on;
    }
}
