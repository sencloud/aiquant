# singzquant.com — 官网落地页（静态站点）
#
# 与 api.singzquant.com 同机部署，但这是主域名的「展示站」，纯静态文件，
# 不反代后端。文件目录：/server/www/（index.html 等）。
#
# ── 部署前置条件（两个，缺一不可）──────────────────────────────────
#   1) DNS：singzquant.com 与 www.singzquant.com 的 A 记录都指向本机
#      （47.110.227.73）。当前 www 指向的是另一台 IP，apex 无解析，需先改 DNS。
#   2) TLS 证书：现有 /server/ssl 只有 api.singzquant.com 的证书，
#      不覆盖主域名。需为 singzquant.com(+www) 单独签一份：
#        * 阿里云 DV 免费证书 → 下载 nginx 格式 → 放到
#          /server/ssl/singzquant.com.pem / .key
#        * 或 Let's Encrypt：装 certbot 后用下方 acme-challenge 路径签发。
#   3) 备案：大陆服务器对外提供网站服务，主域名需完成 ICP 备案。
#
# ── 启用步骤 ──────────────────────────────────────────────────────
#   rsync -a backend/deploy/www/  /server/www/
#   cp singzquant.com.conf /etc/nginx/sites-available/
#   ln -s /etc/nginx/sites-available/singzquant.com.conf /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#   # 证书就绪后，取消下方 443 server 块注释并删掉 80 块里的 location /

server {
    listen 80;
    listen [::]:80;
    server_name singzquant.com www.singzquant.com;

    # Let's Encrypt webroot 续签预留
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    # 证书就绪后：把下面整段 location / 换成 `return 301 https://$host$request_uri;`
    root /server/www;
    index index.html;
    charset utf-8;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, max-age=600";
    }

    add_header X-Content-Type-Options nosniff always;
    server_tokens off;
    access_log /var/log/nginx/singzquant.com.access.log;
    error_log  /var/log/nginx/singzquant.com.error.log;
}

