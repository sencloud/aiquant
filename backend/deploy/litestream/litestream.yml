# Litestream 配置文件，安装位置：/etc/litestream.yml
#
# 该配置把 SQLite 主库 /server/data/finme.db 的 WAL 实时复制到阿里云 OSS。
# 阿里云 OSS 兼容 S3 协议，把 endpoint 设为对应区域的 S3-compatible URL：
#   https://<bucket>.<region>.aliyuncs.com   →  region 需写 cn-hangzhou 等
# 也可以用通用 S3 endpoint 形式：https://oss-cn-shanghai.aliyuncs.com
#
# 凭据通过 systemd EnvironmentFile=/server/secrets/litestream.env 注入：
#   LITESTREAM_ACCESS_KEY_ID=<RAM-AK>
#   LITESTREAM_SECRET_ACCESS_KEY=<RAM-SK>
#   LITESTREAM_S3_ENDPOINT=https://oss-cn-shanghai.aliyuncs.com
#   LITESTREAM_S3_BUCKET=finme-backup
#
# 验证恢复：
#   litestream restore -o /tmp/finme.restored.db -config /etc/litestream.yml /server/data/finme.db
#   sqlite3 /tmp/finme.restored.db 'SELECT COUNT(1) FROM users'

access-key-id: ${LITESTREAM_ACCESS_KEY_ID}
secret-access-key: ${LITESTREAM_SECRET_ACCESS_KEY}

dbs:
  - path: /server/data/finme.db
    replicas:
      - type: s3
        endpoint: ${LITESTREAM_S3_ENDPOINT}
        bucket: ${LITESTREAM_S3_BUCKET}
        path: finme/finme.db
        region: cn-shanghai
        force-path-style: true
        retention: 168h            # 保留 7 天 snapshot
        snapshot-interval: 1h      # 每小时快照
        sync-interval: 1s          # WAL 实时复制
