name: fincept_app
description: "FINCEPT 终端的移动 / Web 版：内置 DeepSeek AI 助理 + Tushare 驱动的投资组合。"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Storage (cross-platform: Android/iOS/Web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI helpers
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.4

  # Environment variables loaded from a bundled .env asset
  flutter_dotenv: ^5.2.1
  pdf: ^3.12.0
  printing: ^5.14.3
  csv: ^8.0.0
  share_plus: ^13.1.0
  file_picker: ^3.0.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#D97706"
  web:
    generate: true
    image_path: "assets/branding/app_icon.png"
    background_color: "#D97706"
    theme_color: "#D97706"
