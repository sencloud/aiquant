name: fincept_app
description: "喜宽 — 一款轻量的 AI 投资助手，帮你聊行情、管组合、做日报。"
publish_to: 'none'
version: 1.0.5+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Storage (cross-platform: Android/iOS/Web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI helpers
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.4
  qr_flutter: ^4.1.0

  # Environment variables loaded from a bundled .env asset
  flutter_dotenv: ^5.2.1
  pdf: ^3.12.0
  printing: ^5.14.3
  csv: ^8.0.0
  share_plus: ^10.1.4
  file_picker: ^3.0.4
  image_picker: ^1.1.2

  # Backend SDK：双 token 安全存储 / SiwA / 设备信息 / 应用版本
  flutter_secure_storage: ^10.0.0
  sign_in_with_apple: ^6.1.4
  device_info_plus: ^11.3.0
  package_info_plus: ^8.1.0
  in_app_purchase: ^3.2.3
  url_launcher: ^6.3.1

  # WebView for rendering long-form HTML reports (AI 直播)
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/branding/

flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#D97706"
  web:
    generate: true
    image_path: "assets/branding/app_icon.png"
    background_color: "#D97706"
    theme_color: "#D97706"
