name: fincept_app
description: "FINCEPT 终端的移动 / Web 版：内置 DeepSeek AI 助理 + Tushare 驱动的投资组合。"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State / DI
  provider: ^6.1.2

  # Networking
  dio: ^5.7.0
  http: ^1.2.2

  # Storage (cross-platform: Android/iOS/Web)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4

  # UI helpers
  fl_chart: ^0.69.0
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_markdown: ^0.7.4

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
